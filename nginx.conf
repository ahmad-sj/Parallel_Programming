events { worker_connections 1024; }

http {
    upstream api_servers {
        # Docker's internal DNS automatically load-balances 
        # across all containers named "api"

        # Activates the Least Connections algorithm
        #least_conn;

        # Round Robin (default)
        #server api:8080;

        # Weighted Round-Robin
        server parallelprogramming-api-1:8080 weight=3;
        server parallelprogramming-api-2:8080 weight=1;
        server parallelprogramming-api-3:8080 weight=1;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://api_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
